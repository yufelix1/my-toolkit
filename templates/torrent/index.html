<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>种子转磁力工具</title>
    <style>
        body { 
            font-family: Arial; 
            margin: 40px; 
            line-height: 1.6; 
        }
        .btn { 
            padding: 12px 24px; 
            background: #0066cc; 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-size: 16px; 
            border-radius: 4px;
        }
        .btn:hover { background: #0055aa; }
        .btn:disabled { background: #999; cursor: not-allowed; }
        #upload-result, #result { margin: 15px 0; font-size: 18px; }
        #magnet-content {
            background: #f8f8f8;
            border: 1px solid #ddd;
            padding: 15px;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: monospace;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>种子转磁力（仅 BTIH）</h1>
    
    <h3>1. 上传 .torrent 文件</h3>
    <input type="file" id="fileInput" multiple accept=".torrent" style="margin-bottom:10px;">
    <button onclick="uploadFiles()" class="btn">上传文件</button>
    <div id="upload-result"></div>

    <hr>
    <h3>2. 执行转换</h3>
    <button onclick="triggerConvert()" class="btn">一键转换所有 torrent → 磁力</button>
    <div id="result"></div>

    <div id="content-section" style="display: none; margin-top: 20px;">
        <h3>✅ 转换完成 - 磁力链接列表</h3>
        <button onclick="copyToClipboard()" class="btn" style="background:#28a745;">复制全部磁力链接</button>
        <pre id="magnet-content"></pre>
    </div>

    <script>
    async function uploadFiles() {
        const files = document.getElementById('fileInput').files;
        if (files.length === 0) {
            alert("请选择 .torrent 文件");
            return;
        }

        const formData = new FormData();
        for (let file of files) {
            formData.append('files', file);
        }

        const resultDiv = document.getElementById('upload-result');
        resultDiv.innerHTML = '上传中...';

        try {
            const res = await fetch('/tools/torrent/upload', { method: 'POST', body: formData });
            const data = await res.json();
            
            if (data.success) {
                resultDiv.innerHTML = `<span style="color:green">${data.message}</span>`;
                document.getElementById('fileInput').value = '';
            } else {
                resultDiv.innerHTML = `<span style="color:red">上传失败</span>`;
            }
        } catch (err) {
            resultDiv.innerHTML = `<span style="color:red">上传出错</span>`;
        }
    }

    async function triggerConvert() {
        const resultDiv = document.getElementById('result');
        const contentSection = document.getElementById('content-section');
        resultDiv.innerHTML = '转换中...';
        contentSection.style.display = 'none';

        try {
            const res = await fetch('/tools/torrent/convert', { method: 'POST' });
            const data = await res.json();
            
            if (data.status === 'success') {
                resultDiv.innerHTML = `<span style="color:green">✅ 转换成功！共 ${data.count} 个磁力链接</span>`;
                await loadLatestMagnetContent(data.file);
            }
        } catch (err) {
            resultDiv.innerHTML = `<span style="color:red">转换失败</span>`;
        }
    }

    async function loadLatestMagnetContent(filename) {
        try {
            const res = await fetch(`/tools/torrent/download/${filename}`);
            const text = await res.text();
            document.getElementById('magnet-content').textContent = text;
            document.getElementById('content-section').style.display = 'block';
        } catch (err) {
            console.error("读取文件失败", err);
        }
    }

    function copyToClipboard() {
        const content = document.getElementById('magnet-content').textContent.trim();
        if (!content) return;
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(content);
        } else {
            const textarea = document.createElement('textarea');
            textarea.value = content;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
        }
    }
    </script>
</body>
</html>
