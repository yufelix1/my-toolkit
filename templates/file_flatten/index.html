{% extends "base.html" %}

{% block title %}文件整理工具{% endblock %}

{% block content %}
    <h1>📁 文件整理工具</h1>
    <p class="subtitle">两层目录展平 → 时间戳或固定名称目录</p>

    <label>目标目录路径：</label>
    <input type="text" id="path" placeholder="/path/to/your/folder" />

    <div class="option">
        <label>
            <input type="checkbox" id="delete_subdirs" />
            删除移动后的子目录（默认不删除）
        </label>
    </div>

    <div class="option">
        <label>
            <input type="checkbox" id="use_custom_name" onchange="toggleCustomName()" />
            使用固定目录名称（默认使用时间戳）
        </label>
        <input type="text" id="custom_name" placeholder="Season 1" value="Season 1" style="display: none;" />
    </div>

    <button onclick="startFlatten()">开始整理文件</button>

    <div id="result" class="result"></div>

    <script>
        function toggleCustomName() {
            const cb = document.getElementById('use_custom_name');
            const input = document.getElementById('custom_name');
            input.style.display = cb.checked ? 'block' : 'none';
        }

        async function startFlatten() {
            const path = document.getElementById('path').value.trim();
            if (!path) return alert("请输入目录路径");

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '正在处理...';

            try {
                const res = await fetch('/tools/file-flatten/api', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        path: path,
                        delete_subdirs: document.getElementById('delete_subdirs').checked,
                        custom_name: document.getElementById('use_custom_name').checked ? 
                                    document.getElementById('custom_name').value.trim() : null
                    })
                });
                const data = await res.json();
                resultDiv.style.color = data.success ? 'green' : 'red';
                resultDiv.innerHTML = data.message;
            } catch (e) {
                resultDiv.style.color = 'red';
                resultDiv.innerHTML = '请求失败';
            }
        }
    </script>
{% endblock %}
