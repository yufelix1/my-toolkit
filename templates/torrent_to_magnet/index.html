{% extends "base.html" %}

{% block title %}Torrent 转 Magnet{% endblock %}

{% block content %}
    <h1>🔄 Torrent 转 Magnet</h1>
    <p class="subtitle">仅提取 BTIH 磁力链接 · 支持批量上传与 RSS 订阅</p>

    <!-- 输入方式选择 -->
    <div class="option">
        <label><strong>选择输入方式：</strong></label>
        <select id="inputMode" onchange="switchInputMode()" style="padding: 10px; font-size: 16px; width: 100%; max-width: 400px;">
            <option value="upload">上传 .torrent 文件</option>
            <option value="rss">RSS 自动下载种子</option>
        </select>
    </div>

    <!-- 上传方式 -->
    <section id="uploadSection">
        <h2>1 上传 .torrent 文件</h2>
        <input type="file" id="torrentFiles" multiple accept=".torrent" />
        <button onclick="uploadFiles()">上传文件</button>
    </section>

    <!-- RSS 方式 -->
    <section id="rssSection" style="display: none;">
        <h2>1.5 RSS 自动下载种子</h2>
        <label>RSS 地址：</label>
        <input type="text" id="rss_url" placeholder="https://mikanani.me/RSS/Bangumi?bangumiId=2187&subgroupid=203" />

        <div class="option">
            <label>过滤关键字（用逗号分隔，匹配则跳过）：</label>
            <input type="text" id="filters" placeholder="BIG5,720p,繁体" />
        </div>

        <button onclick="downloadFromRSS()">下载 RSS 中的种子</button>
    </section>

    <section>
        <h2>2. 执行转换</h2>
        <button onclick="convertToMagnet()">一键转换所有 torrent → 磁力链接</button>
    </section>

    <div id="result" class="result"></div>

    <script>
        function switchInputMode() {
            const mode = document.getElementById('inputMode').value;
            document.getElementById('uploadSection').style.display = mode === 'upload' ? 'block' : 'none';
            document.getElementById('rssSection').style.display = mode === 'rss' ? 'block' : 'none';
        }

        // 默认显示上传方式
        window.onload = function() {
            switchInputMode();
        };

        async function uploadFiles() {
            const files = document.getElementById('torrentFiles').files;
            if (files.length === 0) return alert("请选择 .torrent 文件");

            const formData = new FormData();
            for (let file of files) {
                formData.append('files', file);
            }

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '正在上传...';

            try {
                const res = await fetch('/tools/torrent-to-magnet/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                resultDiv.style.color = data.success ? '#27ae60' : 'red';
                resultDiv.innerHTML = data.message || data.error;
            } catch (e) {
                resultDiv.style.color = 'red';
                resultDiv.innerHTML = '上传失败：' + e.message;
            }
        }

        async function downloadFromRSS() {
            const rss_url = document.getElementById('rss_url').value.trim();
            const filters = document.getElementById('filters').value.trim();

            if (!rss_url) return alert("请输入 RSS 地址");

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '正在从 RSS 下载种子...';

            try {
                const res = await fetch('/tools/torrent-to-magnet/rss', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rss_url, filters })
                });
                const data = await res.json();
                resultDiv.style.color = data.success ? '#27ae60' : 'red';
                resultDiv.innerHTML = data.message;
            } catch (e) {
                resultDiv.style.color = 'red';
                resultDiv.innerHTML = 'RSS 下载失败';
            }
        }

        async function convertToMagnet() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '正在转换...';

            const res = await fetch('/tools/torrent-to-magnet/convert', { method: 'POST' });
            const data = await res.json();

            if (data.status === "success") {
                resultDiv.innerHTML = `
                    ✅ 转换完成！共 ${data.count} 个磁力链接<br>
                    <a href="/tools/torrent-to-magnet/download/${data.file}" download>📥 下载磁力链接文件</a>
                `;
            }
        }
    </script>
{% endblock %}
