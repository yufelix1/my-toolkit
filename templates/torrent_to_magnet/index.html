{% extends "base.html" %}

{% block title %}Torrent 转 Magnet{% endblock %}

{% block content %}
    <h1>🔄 Torrent 转 Magnet</h1>
    <p class="subtitle">仅提取 BTIH 磁力链接 · 支持批量上传与 RSS 订阅</p>

    <section>
        <h2>1. 上传 .torrent 文件</h2>
        <input type="file" id="torrentFiles" multiple accept=".torrent" />
        <button onclick="uploadFiles()">上传文件</button>
    </section>

    <section>
        <h2>1.5 RSS 自动下载种子</h2>
        <label>RSS 地址：</label>
        <input type="text" id="rss_url" placeholder="https://example.com/rss.xml" />

        <div class="option">
            <label>过滤关键字（用逗号分隔，匹配则跳过）：</label>
            <input type="text" id="filters" placeholder="例如: 1080p, x265" />
        </div>

        <button onclick="downloadFromRSS()">下载 RSS 中的种子</button>
    </section>

    <section>
        <h2>2. 执行转换</h2>
        <button onclick="convertToMagnet()">一键转换所有 torrent → 磁力链接</button>
        <button onclick="getCurrentMagnets()" style="margin-left: 12px;">查看当前已加载的磁力</button>
    </section>

    <div id="result" class="result"></div>

    <script>
        async function uploadFiles() {
            const files = document.getElementById('torrentFiles').files;
            if (files.length === 0) return alert("请选择 .torrent 文件");

            const formData = new FormData();
            for (let file of files) {
                formData.append('files', file);
            }

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '正在上传...';

            try {
                const res = await fetch('/tools/torrent-to-magnet/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                resultDiv.style.color = data.success ? '#27ae60' : 'red';
                resultDiv.innerHTML = data.message || data.error;
            } catch (e) {
                resultDiv.style.color = 'red';
                resultDiv.innerHTML = '上传失败：' + e.message;
            }
        }

        async function downloadFromRSS() {
            const rss_url = document.getElementById('rss_url').value.trim();
            const filters = document.getElementById('filters').value.trim();

            if (!rss_url) return alert("请输入 RSS 地址");

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '正在从 RSS 下载种子...';

            try {
                const res = await fetch('/tools/torrent-to-magnet/rss', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ rss_url, filters })
                });
                const data = await res.json();
                resultDiv.style.color = data.success ? '#27ae60' : 'red';
                resultDiv.innerHTML = data.message;
            } catch (e) {
                resultDiv.style.color = 'red';
                resultDiv.innerHTML = 'RSS 下载失败';
            }
        }

        async function convertToMagnet() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '正在转换...';

            try {
                const res = await fetch('/tools/torrent-to-magnet/convert', {
                    method: 'POST'
                });
                const data = await res.json();

                let html = `<strong>✅ 转换完成！共 ${data.count} 个磁力链接</strong><br><br>`;
                
                if (data.magnets && data.magnets.length > 0) {
                    html += `<strong>磁力链接列表：</strong><br>`;
                    data.magnets.forEach(m => {
                        html += `<a href="${m}" target="_blank">${m}</a><br><br>`;
                    });
                    html += `<a href="/tools/torrent-to-magnet/download/${data.file}" download>📥 下载 magnets_${data.file.split('_')[1]}.txt</a>`;
                }

                resultDiv.style.color = '#27ae60';
                resultDiv.innerHTML = html;
            } catch (e) {
                resultDiv.style.color = 'red';
                resultDiv.innerHTML = '转换失败';
            }
        }

        async function getCurrentMagnets() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '正在获取...';

            try {
                const res = await fetch('/tools/torrent-to-magnet/magnets');
                const data = await res.json();

                let html = `<strong>当前已加载 ${data.count} 个磁力链接：</strong><br><br>`;
                data.magnets.forEach(m => {
                    html += `<a href="${m}" target="_blank" style="word-break: break-all;">${m}</a><br><br>`;
                });

                resultDiv.style.color = '#2c3e50';
                resultDiv.innerHTML = html;
            } catch (e) {
                resultDiv.style.color = 'red';
                resultDiv.innerHTML = '获取失败';
            }
        }
    </script>
{% endblock %}
